name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Ensure Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install BATS
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install bats-core
          else
            sudo apt-get update && sudo apt-get install -y bats
          fi

      - name: Run basic validation tests
        run: bash tests/run-tests.sh

      - name: Run BATS tests
        run: bats tests/*.bats

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck (error-level — must pass)
        run: shellcheck -S error lib/*.sh checks/*.sh fixes/*.sh audit.sh

      - name: Shellcheck (warning-level — advisory)
        run: shellcheck -S warning lib/*.sh checks/*.sh fixes/*.sh audit.sh || true
